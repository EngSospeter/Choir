<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Choir Finance System</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
    font-family:-apple-system,Segoe UI,sans-serif;
    background:linear-gradient(135deg,#1a472a,#2d5a3d);
    color:#fff;
}

/* HEADER */
.header{
    background:rgba(20,45,35,.85);
    backdrop-filter:blur(8px);
    position:sticky;
    top:0;
    z-index:50;
}
.header-content{
    max-width:1200px;
    margin:auto;
    padding:16px;
}
.header h1{font-size:22px}
.header p{font-size:14px;color:#a7f3d0}

/* CONTAINER */
.container{max-width:1200px;margin:auto;padding:16px}

/* CARDS */
.summary-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:16px;
    margin-bottom:20px;
}
.card{
    padding:20px;
    border-radius:12px;
    box-shadow:0 6px 20px rgba(0,0,0,.3);
}
.card-amount{font-size:22px;font-weight:700}
.card-total{background:#059669}
.card-cash{background:#d97706}
.card-mpesa{background:#ea580c}

/* MAIN GRID */
.main-grid{
    display:grid;
    grid-template-columns:1fr 2fr;
    gap:20px;
}
@media(max-width:900px){
    .main-grid{grid-template-columns:1fr}
}

/* FORM */
.form-card{
    background:#0f3d2f;
    padding:20px;
    border-radius:12px;
}
@media(min-width:900px){
    .form-card{position:sticky;top:80px}
}

input,button{
    width:100%;
    padding:10px;
    border-radius:6px;
    border:1px solid #1e5a3f;
    background:#0a2f23;
    color:#fff;
}

button{
    background:#10b981;
    font-weight:600;
    border:none;
    margin-top:10px;
}

/* TRANSACTIONS */
.transactions-card{
    background:#0f3d2f;
    border-radius:12px;
}

.transactions-list{
    max-height:400px;
    overflow:auto;
    padding:12px;
}

.transaction-item{
    background:#0a2f23;
    padding:10px;
    margin-bottom:8px;
    border-radius:8px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.delete-btn{
    background:#f87171;
    border:none;
    padding:6px;
    border-radius:6px;
}

/* REPORT */
.report-section{
    margin-top:30px;
    background:#0f3d2f;
    padding:20px;
    border-radius:12px;
}

/* MODAL */
.modal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.7);
}
.modal.active{display:block}

.modal-content{
    background:#1a472a;
    margin:10px;
    padding:20px;
    border-radius:12px;
    max-height:90vh;
    overflow:auto;
}

/* MOBILE POLISH */
@media(max-width:600px){
    .header h1{font-size:18px}
    .card-amount{font-size:18px}
}
</style>
</head>

<body>

<div class="header">
<div class="header-content">
<h1>St Matia Mulumba Youth Choir</h1>
<p>Finance System</p>
</div>
</div>

<div class="container">

<!-- SUMMARY -->
<div class="summary-grid">
<div class="card card-total"><div id="totalAmount">KES 0</div></div>
<div class="card card-cash"><div id="cashAmount">KES 0</div></div>
<div class="card card-mpesa"><div id="mpesaAmount">KES 0</div></div>
</div>

<div class="main-grid">

<!-- FORM -->
<div class="form-card">
<form id="form">
<input id="event" placeholder="Description" required>
<input type="date" id="date" required>
<input type="number" id="amount" placeholder="Amount" required>

<select id="type">
<option value="income">Income</option>
<option value="expense">Expense</option>
</select>

<select id="method">
<option value="cash">Cash</option>
<option value="mpesa">M-Pesa</option>
</select>

<button>Add</button>
</form>
</div>

<!-- LIST -->
<div class="transactions-card">
<div id="list" class="transactions-list"></div>
</div>

</div>

<!-- REPORT -->
<div class="report-section">
<input type="month" id="month">
<button onclick="preview()">Preview</button>
<button onclick="download()">Download PDF</button>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
<div class="modal-content">
<button onclick="closeModal()">Close</button>
<div id="report"></div>
</div>
</div>

</div>

<script>
let data=JSON.parse(localStorage.getItem('data'))||[];

const form=document.getElementById('form');
const list=document.getElementById('list');

form.onsubmit=e=>{
e.preventDefault();

data.unshift({
id:Date.now(),
event:event.value,
date:date.value,
amount:+amount.value,
type:type.value,
method:method.value
});

localStorage.setItem('data',JSON.stringify(data));
form.reset();
render();
};

function render(){
list.innerHTML=data.map(t=>`
<div class="transaction-item">
<span>${t.event}</span>
<span>${t.amount}</span>
<button onclick="del(${t.id})">x</button>
</div>`).join('');

let cash=0,mpesa=0;

data.forEach(t=>{
let val=t.type==='income'?t.amount:-t.amount;
if(t.method==='cash')cash+=val;
else mpesa+=val;
});

totalAmount.innerText="KES "+(cash+mpesa);
cashAmount.innerText="KES "+cash;
mpesaAmount.innerText="KES "+mpesa;
}

function del(id){
data=data.filter(t=>t.id!==id);
localStorage.setItem('data',JSON.stringify(data));
render();
}

function preview(){
modal.classList.add('active');
report.innerHTML=JSON.stringify(data,null,2);
}

function closeModal(){
modal.classList.remove('active');
}

function download(){
html2pdf().from(report).save("report.pdf");
}

render();
</script>

</body>
</html>
